<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artifact Runtime</title>
    <!-- Tailwind CSS via CDN for artifact styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React + ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- prop-types required by Recharts -->
    <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
    <!-- Recharts for charts -->
    <script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
    <!-- Babel standalone for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      /* Override Tailwind preflight — it resets html/body to white */
      html {
        background: #18181b !important; /* zinc-900 */
      }
      body {
        margin: 0;
        padding: 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #18181b !important; /* zinc-900 */
        color: #e5e7eb;
        min-height: 100vh;
      }
      #root { width: 100%; }
      #error-display {
        display: none;
        background: #7f1d1d;
        border: 1px solid #ef4444;
        border-radius: 8px;
        padding: 12px;
        color: #fca5a5;
        font-size: 13px;
        font-family: monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display"></div>

    <script>
      // Make React hooks available globally for component code
      const { useState, useEffect, useCallback, useMemo, useRef } = React;

      // Recharts may fail to load — destructure safely so runtime-ready always fires
      const _rc = (typeof Recharts !== 'undefined') ? Recharts : {};
      const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
              LineChart, Line, PieChart, Pie, Cell, ResponsiveContainer } = _rc;

      // Create the React root once and reuse it — calling createRoot() on an
      // already-rooted container causes React 18 warnings and unreliable behaviour.
      const _reactRoot = ReactDOM.createRoot(document.getElementById('root'));

      // Listen for artifact code from the parent frame
      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'render-artifact') {
          renderArtifact(event.data.code);
        }
      });

      function renderArtifact(code) {
        const errorDiv = document.getElementById('error-display');
        errorDiv.style.display = 'none';

        try {
          // Transpile JSX + ES modules → CommonJS using Babel
          // The 'react' preset handles JSX; 'env' with modules:'commonjs' converts
          // `export default` into `exports.default = ...` which we can intercept.
          const transpiled = Babel.transform(code, {
            presets: [
              ['env', { modules: 'commonjs', targets: { browsers: ['last 2 versions'] } }],
              'react'
            ],
            filename: 'artifact.jsx'
          }).code;

          // Inject fake CommonJS module/exports objects so Babel's output has
          // somewhere to write the default export — then we read it back out.
          const fakeModule = { exports: {} };
          const fakeExports = fakeModule.exports;

          const fn = new Function(
            // CommonJS shims
            'module', 'exports',
            // React core
            'React', 'useState', 'useEffect', 'useCallback', 'useMemo', 'useRef',
            // Recharts
            'BarChart', 'Bar', 'XAxis', 'YAxis', 'CartesianGrid', 'Tooltip', 'Legend',
            'LineChart', 'Line', 'PieChart', 'Pie', 'Cell', 'ResponsiveContainer',
            transpiled
          );

          fn(
            fakeModule, fakeExports,
            React, useState, useEffect, useCallback, useMemo, useRef,
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
            LineChart, Line, PieChart, Pie, Cell, ResponsiveContainer
          );

          // Babel writes `export default Foo` as either:
          //   exports.default = Foo          (named export default)
          //   module.exports = Foo           (module.exports assignment)
          const ComponentFn = fakeModule.exports.default || fakeModule.exports;

          if (typeof ComponentFn !== 'function') {
            throw new Error(
              'No default export found. Your component must use:\n  export default function MyComponent() { ... }'
            );
          }

          _reactRoot.render(React.createElement(ComponentFn));
          // Tell the parent the new component has been handed to React
          window.parent.postMessage({ type: 'render-complete' }, '*');

        } catch (err) {
          errorDiv.style.display = 'block';
          errorDiv.textContent = 'Artifact Error:\n' + err.message;
        }
      }

      // Report content height to parent so iframe can resize
      const _root = document.getElementById('root');
      new ResizeObserver(() => {
        window.parent.postMessage({ type: 'resize', height: _root.scrollHeight }, '*');
      }).observe(_root);

      // Signal to parent that runtime is ready
      window.parent.postMessage({ type: 'runtime-ready' }, '*');
    </script>
  </body>
</html>
